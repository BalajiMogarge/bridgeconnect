<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse NGOs — BridgeConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0e0e0e; --paper: #f5f0e8; --cream: #faf7f2;
      --accent: #c8622a; --green: #2d6a4f; --green-light: #52b788;
      --muted: #7a7060; --border: #ddd5c4; --card-bg: #ffffff;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 5vw; background: var(--card-bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; color: var(--ink); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-link { font-size: 0.85rem; color: var(--muted); text-decoration: none; font-weight: 500; transition: color 0.2s; }
    .nav-link:hover { color: var(--ink); }
    .nav-btn { padding: 0.55rem 1.3rem; font-size: 0.85rem; background: var(--ink); color: var(--cream); border-radius: 100px; text-decoration: none; font-weight: 500; transition: background 0.2s; }
    .nav-btn:hover { background: var(--accent); }

    /* HERO */
    .list-hero { background: var(--ink); padding: 3.5rem 5vw; color: var(--cream); }
    .lh-tag { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }
    .lh-title { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 3vw, 2.5rem); font-weight: 700; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
    .lh-sub { color: rgba(245,240,232,0.55); font-size: 0.9rem; margin-bottom: 2rem; }

    /* SEARCH BAR */
    .search-bar { display: flex; gap: 0.75rem; max-width: 640px; }
    .search-input-wrap { flex: 1; position: relative; }
    .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .search-input { width: 100%; padding: 0.8rem 1rem 0.8rem 2.75rem; border-radius: 100px; border: 1.5px solid rgba(245,240,232,0.15); background: rgba(245,240,232,0.08); color: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .search-input::placeholder { color: rgba(245,240,232,0.35); }
    .search-input:focus { border-color: rgba(200,98,42,0.5); background: rgba(245,240,232,0.12); }
    .search-btn { padding: 0.8rem 1.6rem; background: var(--accent); color: #fff; border: none; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; }
    .search-btn:hover { opacity: 0.88; }

    /* FILTERS */
    .filters-bar { padding: 1.2rem 5vw; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .filter-label { font-size: 0.78rem; color: var(--muted); font-weight: 500; margin-right: 0.25rem; }
    .filter-chip { padding: 0.4rem 0.9rem; border-radius: 100px; border: 1.5px solid var(--border); font-size: 0.78rem; cursor: pointer; transition: all 0.18s; background: var(--cream); color: var(--muted); font-family: 'DM Sans', sans-serif; font-weight: 500; }
    .filter-chip:hover { border-color: var(--green); color: var(--green); }
    .filter-chip.active { background: var(--green); border-color: var(--green); color: #fff; }

    /* CONTENT */
    main { flex: 1; padding: 2.5rem 5vw; }
    .list-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .list-count { font-size: 0.85rem; color: var(--muted); }
    .list-count strong { color: var(--ink); }

    .ngo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }

    .ngo-card { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; text-decoration: none; color: var(--ink); display: flex; flex-direction: column; }
    .ngo-card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,0.09); border-color: rgba(45,106,79,0.25); }

    .nc-top { padding: 1.4rem 1.4rem 0; }
    .nc-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.75rem; gap: 0.5rem; }
    .nc-initials { width: 48px; height: 48px; border-radius: 12px; background: rgba(45,106,79,0.1); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--green); flex-shrink: 0; }
    .nc-badge { font-size: 0.68rem; font-weight: 600; background: rgba(45,106,79,0.1); color: var(--green); padding: 0.2rem 0.6rem; border-radius: 100px; letter-spacing: 0.03em; white-space: nowrap; }
    .nc-name { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.2rem; line-height: 1.3; }
    .nc-location { font-size: 0.78rem; color: var(--muted); }
    .nc-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.55; margin: 0.75rem 0 1rem; }

    .nc-causes { display: flex; flex-wrap: wrap; gap: 0.35rem; padding: 0 1.4rem 1rem; }
    .nc-cause { font-size: 0.7rem; font-weight: 600; background: var(--cream); border: 1px solid var(--border); color: var(--muted); padding: 0.18rem 0.6rem; border-radius: 100px; }

    .nc-footer { border-top: 1px solid var(--border); padding: 1rem 1.4rem; display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .nc-city { font-size: 0.78rem; color: var(--muted); }
    .nc-donate { font-size: 0.8rem; font-weight: 600; color: var(--accent); }

    .no-results { text-align: center; padding: 4rem 1rem; color: var(--muted); }
    .no-results strong { display: block; color: var(--ink); font-size: 1rem; margin-bottom: 0.4rem; }

    footer { background: var(--ink); color: rgba(245,240,232,0.4); padding: 1.5rem 5vw; display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; flex-wrap: wrap; gap: 0.5rem; }
    .footer-logo { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--cream); text-decoration: none; }
    .footer-logo span { color: var(--accent); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .ngo-card { animation: fadeUp 0.4s ease both; }

    @media (max-width: 900px) { .ngo-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 560px) { .ngo-grid { grid-template-columns: 1fr; } .search-bar { flex-direction: column; } }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Bridge<span>Connect</span></a>
    <div class="nav-right">
      <a href="donor-dashboard.html" class="nav-link">My Donations</a>
      <a href="donor-login.html" class="nav-btn" id="navAuthBtn">Login</a>
    </div>
  </nav>

  <div class="list-hero">
    <div class="lh-tag">Verified NGOs</div>
    <div class="lh-title">Find a cause worth supporting</div>
    <div class="lh-sub">Every organisation on BridgeConnect is government-verified and admin-approved.</div>
    <div class="search-bar">
      <div class="search-input-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="searchInput" type="text" placeholder="Search by name, city, or cause..." oninput="renderNGOs()" />
      </div>
      <button class="search-btn" onclick="renderNGOs()">Search</button>
    </div>
  </div>

  <div class="filters-bar">
    <span class="filter-label">Filter:</span>
    <button class="filter-chip active" onclick="setFilter('All', this)">All</button>
    <button class="filter-chip" onclick="setFilter('Education', this)">Education</button>
    <button class="filter-chip" onclick="setFilter('Healthcare', this)">Healthcare</button>
    <button class="filter-chip" onclick="setFilter('Child Welfare', this)">Child Welfare</button>
    <button class="filter-chip" onclick="setFilter('Women Empowerment', this)">Women Empowerment</button>
    <button class="filter-chip" onclick="setFilter('Environment', this)">Environment</button>
    <button class="filter-chip" onclick="setFilter('Rural Development', this)">Rural Development</button>
  </div>

  <main>
    <div class="list-meta">
      <div class="list-count">Showing <strong id="countLabel">0</strong> verified NGOs</div>
    </div>
    <div class="ngo-grid" id="ngoGrid"></div>
  </main>

  <footer>
    <a href="index.html" class="footer-logo">Bridge<span>Connect</span></a>
    <div>© 2025 BridgeConnect. All rights reserved.</div>
    <div>Built for India's giving ecosystem</div>
  </footer>

  <script>
    // Seed sample NGOs if none registered
    function getSeedNGOs() {
      return [
        { name:'Udayan Care', city:'Delhi', state:'Delhi', cause:['Child Welfare','Education'], description:'Providing quality education and family-based care for children in need across India.', status:'approved', email:'udayan@example.org' },
        { name:'Akshaya Patra', city:'Bengaluru', state:'Karnataka', cause:['Education','Healthcare'], description:'Mid-day meal programme reaching over 2 million children in government schools every day.', status:'approved', email:'akshaya@example.org' },
        { name:'Goonj', city:'Delhi', state:'Delhi', cause:['Rural Development','Women Empowerment'], description:'Addressing clothing as a basic unmet need while using urban surplus as a development resource.', status:'approved', email:'goonj@example.org' },
        { name:'CRY India', city:'Mumbai', state:'Maharashtra', cause:['Child Welfare'], description:'Working to ensure lasting change in the lives of underprivileged children across India.', status:'approved', email:'cry@example.org' },
        { name:'Smile Foundation', city:'Delhi', state:'Delhi', cause:['Education','Healthcare'], description:'Empowering underprivileged children, women, and communities through education, healthcare and livelihood programmes.', status:'approved', email:'smile@example.org' },
        { name:'Teach For India', city:'Mumbai', state:'Maharashtra', cause:['Education'], description:'Building a movement of leaders committed to ending educational inequity in India.', status:'approved', email:'tfi@example.org' },
        { name:'Sammaan Foundation', city:'Pune', state:'Maharashtra', cause:['Women Empowerment','Rural Development'], description:'Empowering marginalised women through skill development and financial literacy programmes.', status:'approved', email:'sammaan@example.org' },
        { name:'Wildlife SOS', city:'Agra', state:'Uttar Pradesh', cause:['Environment'], description:'Dedicated to protecting India\'s wildlife and natural heritage through conservation and rescue.', status:'approved', email:'wildlifesos@example.org' },
        { name:'iCall', city:'Mumbai', state:'Maharashtra', cause:['Healthcare'], description:'Providing accessible and affordable mental health services and psychosocial support to individuals.', status:'approved', email:'icall@example.org' },
      ];
    }

    let activeFilter = 'All';

    const auth = JSON.parse(localStorage.getItem('bc_auth') || 'null');
    if (auth?.type === 'donor') {
      document.getElementById('navAuthBtn').textContent = 'Dashboard';
      document.getElementById('navAuthBtn').href = 'donor-dashboard.html';
    }

    function setFilter(f, btn) {
      activeFilter = f;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      renderNGOs();
    }

    function getInitials(name) {
      return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
    }

    function renderNGOs() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const stored = JSON.parse(localStorage.getItem('bc_ngos') || '[]').filter(n => n.status === 'approved');
      const all = [...getSeedNGOs(), ...stored];

      const filtered = all.filter(n => {
        const matchQuery = !query || n.name.toLowerCase().includes(query) || n.city.toLowerCase().includes(query) || (n.cause || []).some(c => c.toLowerCase().includes(query));
        const matchFilter = activeFilter === 'All' || (n.cause || []).includes(activeFilter);
        return matchQuery && matchFilter;
      });

      document.getElementById('countLabel').textContent = filtered.length;

      if (filtered.length === 0) {
        document.getElementById('ngoGrid').innerHTML = '<div class="no-results" style="grid-column:1/-1"><strong>No NGOs found</strong>Try a different search or filter</div>';
        return;
      }

      document.getElementById('ngoGrid').innerHTML = filtered.map((n, i) => `
        <a class="ngo-card" href="ngo-profile.html?email=${encodeURIComponent(n.email)}" style="animation-delay:${i * 0.04}s">
          <div class="nc-top">
            <div class="nc-header">
              <div class="nc-initials">${getInitials(n.name)}</div>
              <div class="nc-badge">Verified</div>
            </div>
            <div class="nc-name">${n.name}</div>
            <div class="nc-location">${n.city}, ${n.state}</div>
            <div class="nc-desc">${n.description}</div>
          </div>
          <div class="nc-causes">${(n.cause || []).map(c => `<span class="nc-cause">${c}</span>`).join('')}</div>
          <div class="nc-footer">
            <span class="nc-city">${n.city}</span>
            <span class="nc-donate">Donate &rarr;</span>
          </div>
        </a>
      `).join('');
    }

    renderNGOs();
  </script>
</body>
</html>
